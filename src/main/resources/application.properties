# Spring Boot application properties for RentPro Backend
spring.application.name=rentpro-backend
server.port=${PORT:8083}

# Load .env file from the project root (optional so it won't fail in CI/prod without it)
spring.config.import=optional:file:./.env[.properties]

# Database configuration - use environment variables for security
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/rentpro_db}
spring.datasource.username=${DATABASE_USERNAME:mahmad}
spring.datasource.password=${DATABASE_PASSWORD:2211}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true

spring.mvc.converters.preferred-json-mapper=jackson

# JWT configuration - use environment variables for security
app.jwt.secret=${JWT_SECRET:CHANGE_THIS_TO_A_LONG_RANDOM_SECRET_32CHARS_MINIMUM}
app.jwt.ttlMillis=${JWT_TTL:86400000}

# Rate limiting configuration
rate.limit.auth.requests=${RATE_LIMIT_AUTH:5}
rate.limit.api.requests=${RATE_LIMIT_API:100}
rate.limit.upload.requests=${RATE_LIMIT_UPLOAD:10}

# Enable detailed logging for Spring Security (disable in production)
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:INFO}
logging.level.org.springframework.security.web.access=${SECURITY_ACCESS_LOG_LEVEL:INFO}
logging.level.org.springframework.security.authorization=${SECURITY_AUTH_LOG_LEVEL:INFO}
logging.level.org.springframework.security.authorization.method=${SECURITY_METHOD_LOG_LEVEL:INFO}

# Enable SQL logging (disable in production)
logging.level.org.hibernate.SQL=${SQL_LOG_LEVEL:INFO}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${SQL_BIND_LOG_LEVEL:INFO}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${FORMAT_SQL:true}

# Error handling - limit exposure in production
server.error.include-message=${ERROR_INCLUDE_MESSAGE:never}
server.error.include-binding-errors=${ERROR_INCLUDE_BINDING:never}
server.error.include-stacktrace=${ERROR_INCLUDE_STACKTRACE:never}

# Frontend base URL (used in password reset emails)
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:8104}

# Push notifications (Firebase Cloud Messaging)
fcm.server.key=${FCM_SERVER_KEY:}

# Email â€” Resend (https://resend.com)
resend.api.key=${RESEND_API_KEY:}

# Legacy SMTP kept in properties but no longer used
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Security headers configuration
security.headers.xss-protection=${XSS_PROTECTION:true}
security.headers.content-type-options=${CONTENT_TYPE_OPTIONS:true}
security.headers.frame-options=${FRAME_OPTIONS:DENY}
security.headers.strict-transport-security=${HSTS:max-age=31536000; includeSubDomains}

# App version policy (used by frontend mandatory update checks)
app.version.message=${APP_VERSION_MESSAGE:A new version is required to continue.}

app.version.android.latest=${APP_VERSION_ANDROID_LATEST:1.0.0}
app.version.android.minSupported=${APP_VERSION_ANDROID_MIN:1.0.0}
app.version.android.updateUrl=${APP_VERSION_ANDROID_URL:https://play.google.com/store/apps/details?id=com.rentpro.app}

app.version.ios.latest=${APP_VERSION_IOS_LATEST:1.0.0}
app.version.ios.minSupported=${APP_VERSION_IOS_MIN:1.0.0}
app.version.ios.updateUrl=${APP_VERSION_IOS_URL:https://apps.apple.com}

app.version.web.latest=${APP_VERSION_WEB_LATEST:1.0.0}
app.version.web.minSupported=${APP_VERSION_WEB_MIN:1.0.0}
app.version.web.updateUrl=${APP_VERSION_WEB_URL:https://your-domain.example.com/download}

# Storage configuration
app.storage.provider=${STORAGE_PROVIDER:local}
app.storage.s3.bucket=${S3_BUCKET:}
app.storage.s3.region=${S3_REGION:}
app.storage.s3.access-key=${S3_ACCESS_KEY:}
app.storage.s3.secret-key=${S3_SECRET_KEY:}
app.storage.s3.endpoint=${S3_ENDPOINT:}
app.storage.s3.public-base-url=${S3_PUBLIC_BASE_URL:}
app.storage.s3.key-prefix=${S3_KEY_PREFIX:rentpro}
app.storage.s3.path-style-access=${S3_PATH_STYLE_ACCESS:true}

# Groq AI configuration (free tier â€” get key at console.groq.com)
groq.api.key=${GROQ_API_KEY:}

# Admin crash alert email (leave blank to disable notifications)
app.admin.email=${ADMIN_NOTIFICATION_EMAIL:}

# Payment gateway configuration
payment.currency=${PAYMENT_CURRENCY:MYR}

payment.paypal.enabled=${PAYPAL_ENABLED:false}
payment.paypal.base-url=${PAYPAL_BASE_URL:https://api-m.sandbox.paypal.com}
payment.paypal.client-id=${PAYPAL_CLIENT_ID:}
payment.paypal.client-secret=${PAYPAL_CLIENT_SECRET:}
payment.paypal.webhook-id=${PAYPAL_WEBHOOK_ID:}

payment.adyen.enabled=${ADYEN_ENABLED:false}
payment.adyen.base-url=${ADYEN_BASE_URL:https://checkout-test.adyen.com}
payment.adyen.api-key=${ADYEN_API_KEY:}
payment.adyen.merchant-account=${ADYEN_MERCHANT_ACCOUNT:}
payment.adyen.hmac-key=${ADYEN_HMAC_KEY:}

payment.stripe.enabled=${STRIPE_ENABLED:false}
payment.stripe.secret-key=${STRIPE_SECRET_KEY:}
payment.stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:}
payment.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
payment.stripe.connect-client-id=${STRIPE_CONNECT_CLIENT_ID:}
payment.stripe.backend-base-url=${STRIPE_BACKEND_BASE_URL:http://localhost:8080}
payment.stripe.frontend-base-url=${STRIPE_FRONTEND_BASE_URL:http://localhost:8104}

