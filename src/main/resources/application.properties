spring.application.name=rentpro-backend
server.port=8082
spring.datasource.url=jdbc:postgresql://localhost:5432/rentpro_db
spring.datasource.username=mahmad
spring.datasource.password=2211

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-migration-naming=true

spring.mvc.converters.preferred-json-mapper=jackson

app.jwt.secret=THIS_IS_A_LONG_SECRET_KEY_CHANGE_LATER
app.jwt.expiration-ms=86400000

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security=TRACE
logging.level.org.springframework.security.web.access=TRACE
logging.level.org.springframework.security.authorization=TRACE
logging.level.org.springframework.security.authorization.method=TRACE

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your@gmail.com
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
